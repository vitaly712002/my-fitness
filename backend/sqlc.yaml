# sqlc config: reads db/migrations as the source of truth for the schema
# (the same files goose applies to the real database) and db/queries for the
# SQL we want turned into Go functions. Output goes into internal/repository,
# committed to the repo like any other generated code — `make sqlc-generate`
# regenerates it after adding or changing a query.
version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
